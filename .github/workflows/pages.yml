# Build the backend-less SPA and deploy it to GitHub Pages.
#
# The Pages build runs the *real* ndiff reduction pipeline in the user's browser
# via Pyodide (see web/.env.pages → VITE_DATA_MODE=pyodide, web/src/api/
# pyodideEngine.ts).  The pipeline code ships as a data-free `ndiff` wheel that
# the page micropip-installs at runtime; the wheel is gitignored (a careless
# build could bundle experimental data), so CI builds it fresh here — data-free —
# into web/public/wheels/ before `vite build` copies it into the bundle.
# No data is hosted: users supply their own volume at runtime.
name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build data-free ndiff wheel
        working-directory: .
        run: |
          python -m pip install --upgrade pip build
          rm -rf build src/*.egg-info src/ndiff/server/static/data
          python -m pip wheel . --no-deps --no-cache-dir -w web/public/wheels
          # Fail the build if any experimental data leaked into the wheel.
          if unzip -l web/public/wheels/*.whl | grep -iqE '\.(bin|nxs|h5|hdf5|npy)'; then
            echo "DATA LEAK in wheel — aborting"; exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build SPA (Pyodide mode)
        run: npm run build:pages
      # ONE-TIME SETUP: enable Pages first, or this step fails with "Get Pages
      # site failed / Not Found". Repo Settings → Pages → Build and deployment →
      # Source: "GitHub Actions". (The workflow token cannot create the site
      # itself, so this must be done manually once.)
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
